<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto - ChocoDelicia</title>

  <!-- CSS externo -->
  <link rel="stylesheet" href="styles.css">
</head>

<body class="Contacto">

  <!-- HEADER -->
  <header>
    <h1>ChocoDelicia</h1>

    <!-- NAV -->
    <nav>
      <a href="index.html">Inicio</a>
      <a href="servicios.html">Productos</a>
      <a href="equipo.html">Equipo</a>
      <a href="sobre.html">Sobre nosotros</a>
      <a href="contacto.html">Contacto</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main>

    <section>
      <h2>Contáctanos</h2>

      <p>
        ¿Tienes alguna duda sobre nuestros chocolates?
        Rellena el formulario y te responderemos lo antes posible.
      </p>

      <!-- FORMULARIO -->
      <form action="resultado.html" method="get">

        <!-- NOMBRE -->
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre">

        <!-- EMAIL -->
        <label for="correo">Correo:</label>
        <input type="email" id="correo" name="correo">

        <!-- TELÉFONO -->
        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono">

        <!-- SELECT -->
        <label for="motivo">Motivo del contacto:</label>
        <select id="motivo" name="motivo">
          <option>Información de productos</option>
          <option>Pedido</option>
          <option>Reclamación</option>
        </select>

        <!-- RADIO -->
        <p>¿Eres cliente?</p>

        <input type="radio" id="si" name="cliente" value="si">
        <label for="si">Sí</label>

        <input type="radio" id="no" name="cliente" value="no">
        <label for="no">No</label>

        <!-- CHECKBOX -->
        <p>¿Qué te interesa?</p>

        <input type="checkbox" id="negro" name="negro">
        <label for="negro">Chocolate negro</label>

        <input type="checkbox" id="leche" name="leche">
        <label for="leche">Chocolate con leche</label>

        <input type="checkbox" id="blanco" name="blanco">
        <label for="blanco">Chocolate blanco</label>

        <!-- MENSAJE -->
        <label for="mensaje">Mensaje:</label>
        <textarea id="mensaje" name="mensaje"></textarea>

        <!-- BOTÓN -->
        <button type="submit">Enviar</button>

      </form>

    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 ChocoDelicia - Todos los derechos reservados</p>
  </footer>

</body>
</html>
